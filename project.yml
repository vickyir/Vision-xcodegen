name: MyVisionApp

options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    visionOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true
    DEAD_CODE_STRIPPING: true

targets:

  # ───────────────────────────────────────────
  # Main App Target
  # ───────────────────────────────────────────
  MyVisionApp:
    type: application
    platform: visionOS
    deploymentTarget:
      visionOS: "26.0"
    sources:
      - path: MyVisionApp
        excludes:
          - "**/*.xcassets/.*"
    resources:
      - path: MyVisionApp/Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.MyVisionApp
        PRODUCT_NAME: MyVisionApp
        INFOPLIST_FILE: MyVisionApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: S8QWSSL8FP
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        

        # Swift / Concurrency
        SWIFT_EMIT_LOC_STRINGS: true
        SWIFT_OPTIMIZATION_LEVEL[config=Debug]: "-Onone"
        SWIFT_OPTIMIZATION_LEVEL[config=Release]: "-Owholemodule"

        # visionOS specifics
#        SUPPORTED_PLATFORMS: xros
#        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false

      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          ENABLE_TESTABILITY: true
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

    dependencies:
      # Uncomment if you split into local SPM packages:
      # - package: MyCore
      # - package: MySpatial
      - package: RealityKitContent

    info:
      path: MyVisionApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: MyVisionApp
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        # Immersive Space scene (RealityKit)
        UIApplicationPreferredDefaultSceneSessionRole: UIWindowSceneSessionRoleVolumetricApplication
        

    preBuildScripts: []
    postBuildScripts: []
    # Uncomment for SwiftLint:
    # preBuildScripts:
    #   - name: SwiftLint
    #     basedOnDependencyAnalysis: false
    #     shell: /bin/sh
    #     script: |
    #       if command -v swiftlint >/dev/null 2>&1; then
    #         swiftlint
    #       fi

  # ───────────────────────────────────────────
  # Unit Test Target
  # ───────────────────────────────────────────
  MyVisionAppTests:
    type: bundle.unit-test
    platform: visionOS
    sources:
      - path: MyVisionAppTests
    dependencies:
      - target: MyVisionApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.myvisionapp.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MyVisionApp.app/MyVisionApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        DEVELOPMENT_TEAM: S8QWSSL8FP
        CODE_SIGN_STYLE: Automatic

# ───────────────────────────────────────────
# Swift Packages (SPM)
# ───────────────────────────────────────────
packages:
  # Example: add remote packages here
  # RealityKitContent:
  #   url: https://github.com/example/RealityKitContent
  #   from: "1.0.0"
  RealityKitContent:
    path: Packages/RealityKitContent

# ───────────────────────────────────────────
# Schemes
# ───────────────────────────────────────────
schemes:
  MyVisionApp:
    build:
      targets:
        MyVisionApp: all
        MyVisionAppTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: ENABLE_PREVIEWS
          value: "0"
          isEnabled: false
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: MyVisionAppTests
          parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
